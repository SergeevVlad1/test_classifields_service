version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    # No ports exposed to the host machine, only available in the docker bridge network
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  selenium-hub:
    image: selenium/hub:4.18.1
    # No ports exposed to the host machine
    expose:
      - "4444"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4444/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  chrome:
    image: selenium/node-chrome:4.18.1
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
    restart: always

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # ONLY the public Django web service has its port open to the host
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
    command: sh -c "python config/manage.py migrate && python config/manage.py runserver 0.0.0.0:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: always

  consumer:
    build:
      context: ./backend/consumer
      dockerfile: Dockerfile
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - SELENIUM_HUB_URL=http://selenium-hub:4444/wd/hub
    depends_on:
      rabbitmq:
        condition: service_healthy
      selenium-hub:
        condition: service_healthy
      chrome:
        condition: service_started
    restart: always
